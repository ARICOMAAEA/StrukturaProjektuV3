<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta Framework V3 — Project Wizard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            primary: {
              50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
              400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
              800: '#1e40af', 900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .tree-line { font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6; }
    .tree-folder { color: #2563eb; font-weight: 500; }
    .tree-file { color: #71717a; }
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      transform: translateY(100px); opacity: 0; transition: all 0.3s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    textarea, input[type="text"], input[type="date"], select {
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .step-indicator { transition: all 0.2s ease; }
    .output-content { max-height: 70vh; overflow-y: auto; }
    pre { white-space: pre-wrap; word-break: break-word; }
    .drag-over::after {
      content: 'Pust soubor pro import';
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      background: rgba(37, 99, 235, 0.08); border: 3px dashed #2563eb;
      font-size: 18px; font-weight: 600; color: #2563eb;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-zinc-50 text-zinc-900 min-h-screen">

  <!-- Toast notification -->
  <div id="toast" class="toast bg-zinc-900 text-white px-4 py-3 rounded-lg shadow-lg text-sm font-medium"></div>

  <!-- Main layout -->
  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-white border-r border-zinc-200 flex-shrink-0 flex flex-col">
      <div class="p-5 border-b border-zinc-200">
        <h1 class="text-base font-bold text-zinc-900">Meta Framework V3</h1>
        <p class="text-xs text-zinc-500 mt-1">Project Structure Wizard</p>
        <div class="flex gap-2 mt-3">
          <button onclick="el('importFile').click()" class="flex-1 px-2 py-2 text-xs font-medium border border-dashed border-zinc-300 rounded-md hover:bg-zinc-50 hover:border-primary-400 transition-colors text-zinc-600 flex items-center justify-center gap-1">
            <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
            Import .md
          </button>
          <button onclick="downloadBlankTemplate()" class="flex-1 px-2 py-2 text-xs font-medium border border-dashed border-zinc-300 rounded-md hover:bg-zinc-50 hover:border-emerald-400 transition-colors text-zinc-600 flex items-center justify-center gap-1">
            <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Stahnout sablonu
          </button>
        </div>
        <input type="file" id="importFile" accept=".md,.txt" class="hidden" onchange="handleImportFile(this)">
      </div>
      <!-- Progress bar -->
      <div class="px-5 py-3 border-b border-zinc-200">
        <div class="flex justify-between text-xs text-zinc-500 mb-1">
          <span>Postup</span>
          <span id="progressLabel">0%</span>
        </div>
        <div class="w-full bg-zinc-100 rounded-full h-1.5">
          <div id="progressBar" class="bg-primary-600 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>
      <!-- Steps -->
      <nav class="flex-1 overflow-y-auto py-2" id="stepNav"></nav>
      <!-- Footer -->
      <div class="p-4 border-t border-zinc-200">
        <button onclick="resetAll()" class="w-full px-3 py-2 text-sm font-medium border border-red-300 rounded-md hover:bg-red-50 hover:border-red-400 transition-colors text-red-600 flex items-center justify-center gap-2">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          Reset wizard
        </button>
        <div class="text-center text-xs text-zinc-400 mt-2">V3.0</div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 flex">
      <!-- Form area -->
      <div class="flex-1 overflow-y-auto">
        <div class="max-w-2xl mx-auto p-8">
          <div id="stepContent" class="fade-in"></div>
          <!-- Navigation buttons -->
          <div class="flex justify-between mt-8 pb-8">
            <button id="btnPrev" onclick="prevStep()" class="px-4 py-2 text-sm font-medium border border-zinc-200 rounded-md hover:bg-zinc-50 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
              &larr; Zpet
            </button>
            <button id="btnNext" onclick="nextStep()" class="px-4 py-2 text-sm font-medium bg-zinc-900 text-white rounded-md hover:bg-zinc-800 transition-colors">
              Dalsi &rarr;
            </button>
          </div>
        </div>
      </div>

      <!-- Preview panel -->
      <aside id="previewPanel" class="w-80 bg-white border-l border-zinc-200 flex-shrink-0 overflow-y-auto">
        <div class="p-4 border-b border-zinc-200">
          <h3 class="text-sm font-semibold text-zinc-700">Live Preview</h3>
          <p class="text-xs text-zinc-400 mt-0.5">Struktura projektu</p>
        </div>
        <div id="treePreview" class="p-4 tree-line text-xs"></div>
      </aside>
    </main>
  </div>

<script>
// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = 'metaframework-v3-wizard';

const defaultState = {
  currentStep: 0,
  metadata: {
    projectType: 'INT',
    customer: '',
    shortName: '',
    fullName: '',
    date: new Date().toISOString().slice(0, 10),
    mode: 'C',
    knowledgeBase: 'C:\\Users\\licka\\OneDrive - ARICOMA\\Prace\\projekty\\9999Claude',
    executionBase: 'C:\\DEV\\Claude',
  },
  business: {
    vision: '',
    value: ['', ''],
    scopeIn: [''],
    scopeOut: [''],
    typeLabel: 'Implementacni',
    constraints: [''],
    assumptions: [''],
    stakeholders: [{ name: '', role: '', responsibility: '' }],
    customerInfo: '',
  },
  knowledge: {
    governanceOverrides: '',
    customRules: [''],
  },
  architecture: {
    techStack: '',
    decisions: [''],
    createAdr: false,
    adrTitle: '',
    adrContext: '',
    adrDecision: '',
    adrConsequences: '',
  },
  engineering: {
    codingStandards: '',
    tools: [''],
    agents: { changelog: true, mdPostprocessor: false, souhrnGpt: true },
    skills: { aiMarkdown: true, keepChangelog: true, endSession: true, workItems: false },
  },
  plan: {
    phases: [
      { name: 'Inicializace', status: 'Hotovo' },
      { name: '', status: 'Ceka' },
    ],
    milestones: [''],
    risks: [{ risk: '', probability: '', impact: '', mitigation: '' }],
  },
  data: {
    sources: [''],
    measurement: '',
    gapTemplate: false,
  },
  resource: {
    references: [{ name: '', url: '', description: '' }],
    systemAccess: [{ system: '', url: '', accessType: '', note: '' }],
    manuals: [''],
  },
  delivery: {
    preset: 'Standard',
    custom: {
      meetings: true, workItems: true, migration: false, integration: false,
      testing: false, releaseTransport: false, operations: false,
    },
    templates: {
      businessRequest: true, changeRequest: true, meetingNote: true,
      meetingScreenshots: true, testCase: true,
    },
  },
};

let state = loadState();

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      return deepMerge(JSON.parse(JSON.stringify(defaultState)), parsed);
    }
  } catch (e) { /* ignore */ }
  return JSON.parse(JSON.stringify(defaultState));
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { /* ignore */ }
}

function deepMerge(target, source) {
  for (const key of Object.keys(source)) {
    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key]) && target[key]) {
      deepMerge(target[key], source[key]);
    } else {
      target[key] = source[key];
    }
  }
  return target;
}

function resetAll() {
  if (confirm('Opravdu resetovat wizard? Vsechna data budou smazana.')) {
    localStorage.removeItem(STORAGE_KEY);
    state = JSON.parse(JSON.stringify(defaultState));
    render();
  }
}

// ============================================================
// STEPS DEFINITION
// ============================================================
const steps = [
  { id: 'metadata', label: 'Metadata', icon: '0' },
  { id: 'business', label: '01 Business', icon: '1' },
  { id: 'knowledge', label: '02 Knowledge', icon: '2' },
  { id: 'architecture', label: '03 Architecture', icon: '3' },
  { id: 'engineering', label: '04 Engineering', icon: '4' },
  { id: 'plan', label: '05 Plan', icon: '5' },
  { id: 'data', label: '06 Data', icon: '6' },
  { id: 'resource', label: '07 Resource', icon: '7' },
  { id: 'delivery', label: 'Delivery', icon: 'D' },
  { id: 'output', label: 'Vystup', icon: '!' },
];

// ============================================================
// HELPERS
// ============================================================
function el(id) { return document.getElementById(id); }

function showToast(msg) {
  const t = el('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function getProjectId() {
  const d = (state.metadata.date || '').replace(/-/g, '').slice(0, 8);
  const s = state.metadata.shortName || 'KratkyNazev';
  return `${d}_${s}`;
}

function sanitizeBase(base, projectType, customer) {
  base = base.replace(/[\\/]+$/, '');
  if (projectType === 'ZAK' && customer) {
    const rxFull = new RegExp('[\\\\/]Zakaznici[\\\\/]' + customer.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '$', 'i');
    base = base.replace(rxFull, '');
    base = base.replace(/[\\/]Zakaznici$/i, '');
  } else {
    base = base.replace(/[\\/]Interni$/i, '');
  }
  return base;
}

function getKnowledgeRoot() {
  const pid = getProjectId();
  const rawBase = state.metadata.knowledgeBase || 'C:\\Users\\licka\\OneDrive - ARICOMA\\Prace\\projekty\\9999Claude';
  const base = sanitizeBase(rawBase, state.metadata.projectType, state.metadata.customer);
  if (state.metadata.projectType === 'ZAK' && state.metadata.customer) {
    return `${base}\\Zakaznici\\${state.metadata.customer}\\${pid}`;
  }
  return `${base}\\Interni\\${pid}`;
}

function getExecutionRoot() {
  const pid = getProjectId();
  const rawBase = state.metadata.executionBase || 'C:\\DEV\\Claude';
  const base = sanitizeBase(rawBase, state.metadata.projectType, state.metadata.customer);
  if (state.metadata.projectType === 'ZAK' && state.metadata.customer) {
    return `${base}\\Zakaznici\\${state.metadata.customer}\\${pid}`;
  }
  return `${base}\\Interni\\${pid}`;
}

function inputField(label, value, onInput, opts = {}) {
  const { type = 'text', placeholder = '', helpText = '', required = false, textarea = false } = opts;
  const req = required ? '<span class="text-red-500 ml-0.5">*</span>' : '';
  const help = helpText ? `<p class="text-xs text-zinc-400 mt-1">${helpText}</p>` : '';
  if (textarea) {
    return `<div class="mb-4">
      <label class="block text-sm font-medium text-zinc-700 mb-1.5">${label}${req}</label>
      <textarea class="w-full border border-zinc-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none resize-y" rows="3" placeholder="${placeholder}" oninput="${onInput}">${escHtml(value)}</textarea>
      ${help}
    </div>`;
  }
  return `<div class="mb-4">
    <label class="block text-sm font-medium text-zinc-700 mb-1.5">${label}${req}</label>
    <input type="${type}" value="${escAttr(value)}" class="w-full border border-zinc-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none" placeholder="${placeholder}" oninput="${onInput}">
    ${help}
  </div>`;
}

function selectField(label, value, options, onInput, helpText = '') {
  const opts = options.map(o => {
    const val = typeof o === 'string' ? o : o.value;
    const lbl = typeof o === 'string' ? o : o.label;
    return `<option value="${escAttr(val)}" ${val === value ? 'selected' : ''}>${escHtml(lbl)}</option>`;
  }).join('');
  const help = helpText ? `<p class="text-xs text-zinc-400 mt-1">${helpText}</p>` : '';
  return `<div class="mb-4">
    <label class="block text-sm font-medium text-zinc-700 mb-1.5">${label}</label>
    <select class="w-full border border-zinc-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none bg-white" onchange="${onInput}">${opts}</select>
    ${help}
  </div>`;
}

function repeatableField(label, items, pathExpr, helpText = '') {
  const help = helpText ? `<p class="text-xs text-zinc-400 mt-1 mb-2">${helpText}</p>` : '';
  let html = `<div class="mb-4"><label class="block text-sm font-medium text-zinc-700 mb-1.5">${label}</label>${help}`;
  items.forEach((item, i) => {
    html += `<div class="flex gap-2 mb-2">
      <input type="text" value="${escAttr(item)}" class="flex-1 border border-zinc-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none" oninput="${pathExpr}[${i}]=this.value;saveState();updatePreview();">
      <button onclick="${pathExpr}.splice(${i},1);if(!${pathExpr}.length)${pathExpr}.push('');saveState();render();" class="px-2 py-1 text-zinc-400 hover:text-red-500 text-sm" title="Odebrat">&times;</button>
    </div>`;
  });
  html += `<button onclick="${pathExpr}.push('');saveState();render();" class="text-xs text-primary-600 hover:text-primary-700 font-medium">+ Pridat polozku</button></div>`;
  return html;
}

function checkboxField(label, checked, onInput, description = '') {
  const desc = description ? `<span class="text-xs text-zinc-400 ml-1">${description}</span>` : '';
  return `<label class="flex items-start gap-2 mb-2 cursor-pointer">
    <input type="checkbox" ${checked ? 'checked' : ''} onchange="${onInput}" class="mt-0.5 rounded border-zinc-300 text-primary-600 focus:ring-primary-500">
    <span class="text-sm text-zinc-700">${label}${desc}</span>
  </label>`;
}

function sectionHeader(title, description) {
  return `<div class="mb-6">
    <h2 class="text-xl font-bold text-zinc-900">${title}</h2>
    <p class="text-sm text-zinc-500 mt-1">${description}</p>
  </div>`;
}

function card(content) {
  return `<div class="bg-white border border-zinc-200 rounded-lg p-5 mb-4 shadow-sm">${content}</div>`;
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ============================================================
// STEP RENDERERS
// ============================================================
function renderStep0() {
  const m = state.metadata;
  let html = `<div class="mb-6 p-4 bg-primary-50 border border-primary-200 rounded-lg">
    <div class="flex items-start gap-3">
      <svg class="w-5 h-5 text-primary-600 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <div>
        <p class="text-sm font-medium text-primary-800">Dva zpusoby prace</p>
        <p class="text-xs text-primary-700 mt-1"><strong>A) Rychly import:</strong> Stahni si prazdnou sablonu tlacitkem <strong>"Stahnout sablonu"</strong> v sidebaru, vyplni ji v editoru a nahraj zpet (<strong>"Import .md"</strong> nebo pretazenim na stranku). Wizard se vyplni a preskoci na vystup.</p>
        <p class="text-xs text-primary-700 mt-1"><strong>B) Krok za krokem:</strong> Vyplnuj formular primo zde — kazdy krok = jedna vrstva.</p>
      </div>
    </div>
  </div>`;
  html += sectionHeader('Metadata projektu', 'Zakladni informace o projektu. Urcuji nazev, cesty a typ.');

  html += card(
    `<div class="mb-4">
      <label class="block text-sm font-medium text-zinc-700 mb-2">Typ projektu</label>
      <div class="flex gap-3">
        <label class="flex items-center gap-2 cursor-pointer px-4 py-2.5 border rounded-md transition-colors ${m.projectType === 'INT' ? 'border-primary-500 bg-primary-50 text-primary-700' : 'border-zinc-200 hover:bg-zinc-50'}">
          <input type="radio" name="projType" value="INT" ${m.projectType === 'INT' ? 'checked' : ''} onchange="state.metadata.projectType=this.value;saveState();render();" class="text-primary-600 focus:ring-primary-500">
          <span class="text-sm font-medium">INT — Interni</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer px-4 py-2.5 border rounded-md transition-colors ${m.projectType === 'ZAK' ? 'border-primary-500 bg-primary-50 text-primary-700' : 'border-zinc-200 hover:bg-zinc-50'}">
          <input type="radio" name="projType" value="ZAK" ${m.projectType === 'ZAK' ? 'checked' : ''} onchange="state.metadata.projectType=this.value;saveState();render();" class="text-primary-600 focus:ring-primary-500">
          <span class="text-sm font-medium">ZAK — Zakaznicky</span>
        </label>
      </div>
    </div>` +
    (m.projectType === 'ZAK' ? inputField('Zakaznik', m.customer, "state.metadata.customer=this.value;saveState();updatePreview();", { placeholder: 'NovaPaka', helpText: 'Bez mezer, CamelCase', required: true }) : '') +
    inputField('Kratky nazev', m.shortName, "state.metadata.shortName=this.value;saveState();updatePreview();", { placeholder: 'OptimalizaceSFS', helpText: 'CamelCase, bez mezer. Pouzit i jako nazev slozky.', required: true }) +
    inputField('Plny nazev', m.fullName, "state.metadata.fullName=this.value;saveState();updatePreview();", { placeholder: 'Optimalizace SFS procesu', helpText: 'Muze obsahovat mezery a diakritiku.', required: true }) +
    inputField('Datum', m.date, "state.metadata.date=this.value;saveState();updatePreview();", { type: 'date' }) +
    selectField('Rezim', m.mode, [
      { value: 'A', label: 'A — Teoreticky (jen knowledge layer)' },
      { value: 'B', label: 'B — Analyticky (knowledge + data)' },
      { value: 'C', label: 'C — Implementacni (knowledge + execution)' },
    ], "state.metadata.mode=this.value;saveState();updatePreview();")
  );

  html += card(
    inputField('Knowledge base', m.knowledgeBase, "state.metadata.knowledgeBase=this.value;saveState();updatePreview();", { placeholder: 'C:\\Users\\...\\9999Claude', helpText: 'Korenova cesta BEZ podslozky Interni/Zakaznici — ta se doplni automaticky. Pokud ji zadate, bude odstranena.' }) +
    inputField('Execution base', m.executionBase, "state.metadata.executionBase=this.value;saveState();updatePreview();", { placeholder: 'C:\\DEV\\Claude', helpText: 'Korenova cesta BEZ podslozky Interni/Zakaznici — ta se doplni automaticky. Pokud ji zadate, bude odstranena.' })
  );

  // Derived paths
  html += `<div class="bg-zinc-50 border border-zinc-200 rounded-lg p-4 text-xs font-mono">
    <div class="mb-2"><span class="text-zinc-500">PROJECT_ID:</span> <span class="text-zinc-800 font-semibold">${escHtml(getProjectId())}</span></div>
    <div class="mb-2"><span class="text-zinc-500">KNOWLEDGE:</span> <span class="text-zinc-700">${escHtml(getKnowledgeRoot())}</span></div>
    <div class="mb-2"><span class="text-zinc-500">EXECUTION:</span> <span class="text-zinc-700">${escHtml(getExecutionRoot())}</span></div>
    <div><span class="text-zinc-500">CONTEXT junction:</span> <span class="text-zinc-700">${escHtml(getExecutionRoot())}\\CONTEXT</span> <span class="text-zinc-400">\u2192</span> <span class="text-zinc-700">${escHtml(getKnowledgeRoot())}</span></div>
  </div>`;

  return html;
}

function renderStep1() {
  const b = state.business;
  let html = sectionHeader('01 BUSINESS — PROC (Why)', 'Proc projekt existuje, co prinasi, co zahrnuje a co ne.');

  html += card(
    inputField('Vision', b.vision, "state.business.vision=this.value;saveState();", { textarea: true, placeholder: 'Proc tento projekt existuje a co chceme dosahnout.', helpText: '1-2 vety.', required: true }) +
    repeatableField('Value / Benefits', b.value, 'state.business.value', 'Co projekt prinasi. Min. 2 polozky.') +
    repeatableField('Scope IN', b.scopeIn, 'state.business.scopeIn', 'Co je soucasti projektu. Min. 1 polozka.') +
    repeatableField('Scope OUT', b.scopeOut, 'state.business.scopeOut', 'Co explicitne neni soucasti projektu.') +
    selectField('Typ projektu', b.typeLabel, ['Implementacni', 'Teoreticky', 'Analyticky'], "state.business.typeLabel=this.value;saveState();") +
    repeatableField('Constraints', b.constraints, 'state.business.constraints', 'Omezeni (technicka, organizacni, casova).') +
    repeatableField('Assumptions', b.assumptions, 'state.business.assumptions', 'Predpoklady, na kterych projekt stavi.')
  );

  // Stakeholders
  let stakeholderRows = '';
  b.stakeholders.forEach((s, i) => {
    stakeholderRows += `<tr>

let activeOutputTab = 0;

function setOutputTab(idx) {
  activeOutputTab = idx;
  for (let i = 0; i < 2; i++) {
    const tab = el('outTab' + i);
    if (i === idx) {
      tab.className = 'px-4 py-2 text-sm font-medium border-b-2 border-primary-600 text-primary-700 transition-colors';
    } else {
      tab.className = 'px-4 py-2 text-sm font-medium border-b-2 border-transparent text-zinc-500 hover:text-zinc-700 transition-colors';
    }
  }
  renderOutputPanel();
}

function renderOutputPanel() {
  const panel = el('outputPanel');
  if (!panel) return;

  if (activeOutputTab === 0) {
    panel.innerHTML = `<div class="p-5 output-content tree-line">${buildTreeHtml()}</div>`;
  } else {
    const prompt = generateClaudePrompt();
    panel.innerHTML = `<div class="p-4">
      <div class="flex gap-2 mb-3">
        <button onclick="copyText(generateClaudePrompt())" class="px-3 py-1.5 text-xs font-medium bg-zinc-900 text-white rounded-md hover:bg-zinc-800">Kopirovat prompt</button>
      </div>
      <pre class="output-content bg-zinc-50 border border-zinc-200 rounded-md p-4 text-xs text-zinc-700 font-mono">${escHtml(prompt)}</pre>
    </div>`;
  }
}

// ============================================================
// DELIVERY PRESETS
// ============================================================
function applyPreset(preset) {
  const c = state.delivery.custom;
  switch (preset) {
    case 'Minimal':
      c.meetings = false; c.workItems = false; c.migration = false;
      c.integration = false; c.testing = false; c.releaseTransport = false; c.operations = false;
      break;
    case 'Standard':
      c.meetings = true; c.workItems = true; c.migration = false;
      c.integration = false; c.testing = false; c.releaseTransport = false; c.operations = false;
      break;
    case 'Full SAP':
      c.meetings = true; c.workItems = true; c.migration = true;
      c.integration = true; c.testing = true; c.releaseTransport = true; c.operations = true;
      break;
  }
}

function getActiveDelivery() {
  const d = state.delivery;
  if (d.preset === 'Minimal') return {};
  const c = d.preset === 'Custom' ? d.custom : (() => { applyPreset(d.preset); return d.custom; })();
  return c;
}

// ============================================================
function buildTree() {
  const pid = getProjectId();
  const name = state.metadata.fullName || pid;
  const del = getActiveDelivery();

  const tree = { name: pid, type: 'dir', children: [] };

  // .claude
  const claude = { name: '.claude', type: 'dir', children: [] };
  const agents = { name: 'agents', type: 'dir', children: [] };
  if (state.engineering.agents.changelog) agents.children.push({ name: 'changelog-manager', type: 'dir', children: [] });
  if (state.engineering.agents.mdPostprocessor) agents.children.push({ name: 'md-postprocessor', type: 'dir', children: [] });
  if (agents.children.length) claude.children.push(agents);
  const skills = { name: 'skills', type: 'dir', children: [] };
  if (state.engineering.skills.aiMarkdown) skills.children.push({ name: 'ai-readable-markdown', type: 'dir', children: [] });
  if (state.engineering.skills.keepChangelog) skills.children.push({ name: 'keep-a-changelog-standard', type: 'dir', children: [] });
  if (state.engineering.skills.endSession) skills.children.push({ name: 'zvl_end-session', type: 'dir', children: [] });
  if (state.engineering.skills.workItems) skills.children.push({ name: 'zvl_work-items', type: 'dir', children: [] });
  if (skills.children.length) claude.children.push(skills);
  claude.children.push({ name: 'hooks', type: 'dir', children: [] });
  claude.children.push({ name: 'settings.json', type: 'file' });
  tree.children.push(claude);

  // 00_PROJECT_CONTROL
  const pc = { name: '00_PROJECT_CONTROL', type: 'dir', children: [] };

function buildTreeHtml(node, prefix, isLast) {
  if (!node) node = buildTree();
  if (prefix === undefined) {
    // Root
    let html = `<div class="tree-folder font-bold">${escHtml(node.name)}/</div>`;
    const children = node.children || [];
    children.forEach((child, i) => {
      html += buildTreeHtml(child, '', i === children.length - 1);
    });
    return html;
  }

  const connector = isLast ? '\u2514\u2500\u2500 ' : '\u251C\u2500\u2500 ';
  const extension = isLast ? '    ' : '\u2502   ';
  const cls = node.type === 'dir' ? 'tree-folder' : 'tree-file';
  const suffix = node.type === 'dir' ? '/' : '';
  let html = `<div><span class="text-zinc-300">${escHtml(prefix + connector)}</span><span class="${cls}">${escHtml(node.name)}${suffix}</span></div>`;

  if (node.children) {
    node.children.forEach((child, i) => {
      html += buildTreeHtml(child, prefix + extension, i === node.children.length - 1);
    });
  }

  return html;
}

function filterNonEmpty(arr) { return (arr || []).filter(s => s && s.trim()); }
function bulletList(arr, fallback) {
  const items = filterNonEmpty(arr);
  return items.length ? items.map(i => `- ${i}`).join('\n') : fallback || '_Neuvedeno._';
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    showToast('Zkopirovano do schranky!');
  } catch (e) {
    // Fallback for file:// protocol
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Zkopirovano do schranky!');
  }
}

function downloadFile(content, filename) {
  // Add UTF-8 BOM for PowerShell
  const bom = '\uFEFF';
  const blob = new Blob([bom + content], { type: 'text/plain; charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`Soubor ${filename} stazen!`);
}

// RENDER
// ============================================================
function render() {
  const step = state.currentStep;

  // Sidebar
  const nav = el('stepNav');
  nav.innerHTML = steps.map((s, i) => {
    const active = i === step;
    const visited = i < step;
    const iconCls = active ? 'bg-primary-600 text-white' : visited ? 'bg-primary-100 text-primary-700' : 'bg-zinc-100 text-zinc-400';
    const textCls = active ? 'text-primary-700 font-semibold' : visited ? 'text-zinc-700' : 'text-zinc-400';
    const borderCls = active ? 'border-l-2 border-primary-600' : 'border-l-2 border-transparent';
    return `<button onclick="goToStep(${i})" class="w-full flex items-center gap-3 px-5 py-2.5 text-left hover:bg-zinc-50 transition-colors ${borderCls}">
      <span class="step-indicator w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${iconCls}">${visited ? '&#10003;' : s.icon}</span>
      <span class="text-sm ${textCls}">${s.label}</span>
    </button>`;
  }).join('');

  // Progress
  const pct = Math.round((step / (steps.length - 1)) * 100);
  el('progressBar').style.width = pct + '%';
  el('progressLabel').textContent = pct + '%';

  // Content
  const renderers = [renderStep0, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5, renderStep6, renderStep7, renderStep8, renderStep9];
  const content = el('stepContent');
  content.innerHTML = renderers[step]();
  content.className = 'fade-in';

  // Buttons
  el('btnPrev').disabled = step === 0;
  el('btnPrev').style.visibility = step === 0 ? 'hidden' : 'visible';
  el('btnNext').textContent = step === steps.length - 1 ? 'Hotovo' : 'Dalsi \u2192';
  el('btnNext').style.visibility = step === steps.length - 1 ? 'hidden' : 'visible';

  // Output tabs
  if (step === 9) {
    setTimeout(() => setOutputTab(activeOutputTab), 0);
  }

  // Preview
  updatePreview();
  saveState();
}

function updatePreview() {
  const preview = el('treePreview');
  if (preview) {
    preview.innerHTML = buildTreeHtml();
  }
}

function goToStep(i) {
  state.currentStep = i;
  render();
}

function nextStep() {
  if (state.currentStep < steps.length - 1) {
    state.currentStep++;
    render();
    window.scrollTo(0, 0);
  }
}

function prevStep() {
  if (state.currentStep > 0) {
    state.currentStep--;
    render();
    window.scrollTo(0, 0);
  }
}

// IMPORT templatestruktura.md PARSER

function handleImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    parseTemplateMarkdown(e.target.result);
    input.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

function parseTemplateMarkdown(text) {
  const lines = text.split('\n');

  // Helper: extract value from a line like "PROJECT_ID:      value"
  function getVar(name) {
    const rx = new RegExp('^' + name + ':\\s*(.+)', 'im');
    const m = text.match(rx);
    return m ? m[1].trim() : '';
  }

  // Helper: extract bullet list items between a heading and next heading/section
  function getBullets(sectionHeading, endPattern) {
    const startRx = new RegExp('^###?\\s+' + sectionHeading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'im');
    const startMatch = text.match(startRx);
    if (!startMatch) return [];
    const startIdx = text.indexOf(startMatch[0]) + startMatch[0].length;
    const rest = text.slice(startIdx);
    const endMatch = rest.match(/^##/m);
    const block = endMatch ? rest.slice(0, endMatch.index) : rest;
    const items = [];
    block.split('\n').forEach(line => {
      const m = line.match(/^-\s+(.+)/);
      if (m && !m[1].startsWith('[') && m[1].trim() !== '') {
        const val = m[1].replace(/^\[.*?\]\s*/, '').trim();
        if (val && val !== '[Benefit 1]' && val !== '[Benefit 2]' && val !== '[Benefit 3]'
            && val !== '[Co je uvnitr scope]' && val !== '[Co je vne scope]'
            && val !== '[Omezeni 1]' && val !== '[Omezeni 2]'
            && val !== '[Predpoklad 1]' && val !== '[Pravidlo 1]'
            && val !== '[Rozhodnuti 1]' && val !== '[Zdroj 1]'
            && val !== '[Nastroj 1]' && val !== '[Manual 1 — cesta nebo URL]'
            && !val.startsWith('[Milnik') && !val.startsWith('[Reference')
            && !val.startsWith('[Co je')) {
          items.push(val);
        }
      }
    });
    return items.length ? items : [''];
  }

  // Helper: extract text between a heading and next heading (non-bullet)
  function getTextBlock(sectionHeading) {
    const startRx = new RegExp('^###?\\s+' + sectionHeading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'im');
    const startMatch = text.match(startRx);
    if (!startMatch) return '';
    const startIdx = text.indexOf(startMatch[0]) + startMatch[0].length;
    const rest = text.slice(startIdx);
    const endMatch = rest.match(/^##/m);
    const block = endMatch ? rest.slice(0, endMatch.index) : rest;
    // Get non-empty, non-comment, non-placeholder lines
    const lines = block.split('\n')
      .filter(l => !l.startsWith('>') && !l.startsWith('```') && !l.startsWith('- [') && l.trim() !== '')
      .map(l => l.trim())
      .filter(l => !l.startsWith('[Vyplnit') && !l.startsWith('[Vyplnit]') && l !== '[Vyplnit]'
                   && !l.startsWith('[Implementacni') && !l.startsWith('[Vychozi')
                   && !l.startsWith('[Zadne zmeny'));
    return lines.join('\n').trim();
  }

  // Helper: extract table rows
  function getTableRows(sectionHeading) {
    const startRx = new RegExp('^###?\\s+' + sectionHeading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'im');
    const startMatch = text.match(startRx);
    if (!startMatch) return [];
    const startIdx = text.indexOf(startMatch[0]) + startMatch[0].length;
    const rest = text.slice(startIdx);
    const endMatch = rest.match(/^##/m);
    const block = endMatch ? rest.slice(0, endMatch.index) : rest;
    const rows = [];
    block.split('\n').forEach(line => {
      if (line.includes('|') && !line.match(/^\|[\s-|]+\|$/) && !line.match(/^\|\s*(Jmeno|Nazev|System|Riziko|Faze)\s*\|/)) {
        const cells = line.split('|').map(c => c.trim()).filter(c => c);
        if (cells.length >= 2 && !cells[0].startsWith('[') && !cells[0].startsWith('---')) {
          rows.push(cells);
        }
      }
    });
    return rows;
  }

  // Parse VARIABLES
  const projectId = getVar('PROJECT_ID');
  const projectType = getVar('PROJECT_TYPE');
  const customer = getVar('CUSTOMER');
  const knowledgeRoot = getVar('KNOWLEDGE_ROOT');
  const executionRoot = getVar('EXECUTION_ROOT');
  const mode = getVar('INITIAL_MODE');
  const date = getVar('DATE');
  const projectName = getVar('PROJECT_NAME');

  // Derive shortName from PROJECT_ID (remove date prefix)
  let shortName = '';
  if (projectId) {
    shortName = projectId.replace(/^\d{8}_?/, '');
  }

  // Derive base paths from KNOWLEDGE_ROOT / EXECUTION_ROOT (strip suffix)
  if (knowledgeRoot) {
    const suffix = knowledgeRoot.match(/\\(?:Interni|Zakaznici)\\.*$/);
    if (suffix) {
      state.metadata.knowledgeBase = knowledgeRoot.slice(0, -suffix[0].length);
    }
  }
  if (executionRoot) {
    const suffix = executionRoot.match(/\\(?:Interni|Zakaznici)\\.*$/);
    if (suffix) {
      state.metadata.executionBase = executionRoot.slice(0, -suffix[0].length);
    }
  }

  // Apply to state
  if (projectType) state.metadata.projectType = projectType.toUpperCase().startsWith('ZAK') ? 'ZAK' : 'INT';
  if (customer) state.metadata.customer = customer;
  if (shortName) state.metadata.shortName = shortName;
  if (projectName) state.metadata.fullName = projectName;
  if (date) state.metadata.date = date;
  if (mode) state.metadata.mode = mode.toUpperCase();

  // BUSINESS
  const vision = getTextBlock('VISION');
  if (vision) state.business.vision = vision;

  const value = getBullets('VALUE');
  if (value.length && value[0]) state.business.value = value;

  const scopeIn = getBullets('SCOPE_IN');
  if (scopeIn.length && scopeIn[0]) state.business.scopeIn = scopeIn;

  const scopeOut = getBullets('SCOPE_OUT');
  if (scopeOut.length && scopeOut[0]) state.business.scopeOut = scopeOut;

  // PROJECT_TYPE_LABEL
  const typeLabelBlock = getTextBlock('PROJECT_TYPE_LABEL');
  if (typeLabelBlock && ['Implementacni', 'Teoreticky', 'Analyticky'].includes(typeLabelBlock)) {
    state.business.typeLabel = typeLabelBlock;
  }

  const constraints = getBullets('CONSTRAINTS');
  if (constraints.length && constraints[0]) state.business.constraints = constraints;

  const assumptions = getBullets('ASSUMPTIONS');
  if (assumptions.length && assumptions[0]) state.business.assumptions = assumptions;

  // STAKEHOLDERS table
  const stakeholderRows = getTableRows('STAKEHOLDERS');
  if (stakeholderRows.length) {
    state.business.stakeholders = stakeholderRows.map(r => ({
      name: r[0] || '', role: r[1] || '', responsibility: r[2] || ''
    }));
  }

  const custInfo = getTextBlock('CUSTOMER_INFO');
  if (custInfo) state.business.customerInfo = custInfo;

  // KNOWLEDGE
  const govOverrides = getTextBlock('GOVERNANCE_OVERRIDES');
  if (govOverrides && govOverrides !== 'Zadne zmeny / Vlastni pravidla') {
    state.knowledge.governanceOverrides = govOverrides;
  }
  const customRules = getBullets('CUSTOM_RULES');
  if (customRules.length && customRules[0]) state.knowledge.customRules = customRules;

  // ARCHITECTURE
  const techStack = getTextBlock('TECHNOLOGY_STACK');
  if (techStack) state.architecture.techStack = techStack;
  const decisions = getBullets('STRUCTURAL_DECISIONS');
  if (decisions.length && decisions[0]) state.architecture.decisions = decisions;

  // Check for ADR
  const adrMatch = text.match(/Vytvorit ADR:\s*\[?\s*(Ano|Ne)/i);
  if (adrMatch && adrMatch[1].toLowerCase() === 'ano') {
    state.architecture.createAdr = true;
    const adrTitle = getTextBlock('FIRST_ADR');
    // Parse ADR sub-fields
    const nazevMatch = text.match(/\*\*Nazev:\*\*\s*(.+)/i) || text.match(/- \*\*Nazev:\*\*\s*(.+)/i);
    if (nazevMatch) state.architecture.adrTitle = nazevMatch[1].replace(/^\[|\]$/g, '').trim();
    const kontextMatch = text.match(/\*\*Kontext:\*\*\s*(.+)/i) || text.match(/- \*\*Kontext:\*\*\s*(.+)/i);
    if (kontextMatch) state.architecture.adrContext = kontextMatch[1].replace(/^\[|\]$/g, '').trim();
    const rozhodnutiMatch = text.match(/\*\*Rozhodnuti:\*\*\s*(.+)/i) || text.match(/- \*\*Rozhodnuti:\*\*\s*(.+)/i);
    if (rozhodnutiMatch) state.architecture.adrDecision = rozhodnutiMatch[1].replace(/^\[|\]$/g, '').trim();
    const dusledkyMatch = text.match(/\*\*Dusledky:\*\*\s*(.+)/i) || text.match(/- \*\*Dusledky:\*\*\s*(.+)/i);
    if (dusledkyMatch) state.architecture.adrConsequences = dusledkyMatch[1].replace(/^\[|\]$/g, '').trim();
  }

  // ENGINEERING
  const codingStd = getTextBlock('CODING_STANDARDS');
  if (codingStd && codingStd !== 'Vychozi / Vlastni standardy') state.engineering.codingStandards = codingStd;
  const tools = getBullets('TOOLS');
  if (tools.length && tools[0]) state.engineering.tools = tools;

  // Agent/Skill checkboxes
  const agentBlock = text.match(/### AGENT_CONFIG[\s\S]*?(?=###|## )/i);
  if (agentBlock) {
    const ab = agentBlock[0];
    state.engineering.agents.changelog = /\[x\].*changelog-manager/i.test(ab);
    state.engineering.agents.mdPostprocessor = /\[x\].*md-postprocessor/i.test(ab);
    state.engineering.agents.souhrnGpt = /\[x\].*souhrn-gpt-updater/i.test(ab);
  }
  const skillBlock = text.match(/### SKILL_CONFIG[\s\S]*?(?=###|## )/i);
  if (skillBlock) {
    const sb = skillBlock[0];
    state.engineering.skills.aiMarkdown = /\[x\].*ai-readable-markdown/i.test(sb);
    state.engineering.skills.keepChangelog = /\[x\].*keep-a-changelog/i.test(sb);
    state.engineering.skills.endSession = /\[x\].*zvl_end-session/i.test(sb);
    state.engineering.skills.workItems = /\[x\].*zvl_work-items/i.test(sb);
  }

  // PLAN
  const phaseRows = getTableRows('PHASES');
  if (phaseRows.length) {
    state.plan.phases = phaseRows.map(r => ({
      name: r[1] || r[0] || '', status: r[2] || r[1] || 'Ceka'
    }));
  }
  const milestones = getBullets('MILESTONES');
  if (milestones.length && milestones[0]) state.plan.milestones = milestones;

  const riskRows = getTableRows('RISKS');
  if (riskRows.length) {
    state.plan.risks = riskRows.map(r => ({
      risk: r[0] || '', probability: r[1] || '', impact: r[2] || '', mitigation: r[3] || ''
    }));
  }

  // DATA
  const dataSources = getBullets('DATA_SOURCES');
  if (dataSources.length && dataSources[0]) state.data.sources = dataSources;
  const measurement = getTextBlock('MEASUREMENT_APPROACH');
  if (measurement) state.data.measurement = measurement;
  const gapMatch = text.match(/### GAP_TEMPLATE[\s\S]*?\[?\s*(Ano|Ne)/i);
  if (gapMatch) state.data.gapTemplate = gapMatch[1].toLowerCase() === 'ano';

  // RESOURCE
  const refRows = getTableRows('EXTERNAL_REFERENCES');
  if (refRows.length) {
    state.resource.references = refRows.map(r => ({
      name: r[0] || '', url: r[1] || '', description: r[2] || ''
    }));
  }
  const sysRows = getTableRows('SYSTEM_ACCESS');
  if (sysRows.length) {
    state.resource.systemAccess = sysRows.map(r => ({
      system: r[0] || '', url: r[1] || '', accessType: r[2] || '', note: r[3] || ''
    }));
  }
  const manuals = getBullets('MANUALS');
  if (manuals.length && manuals[0]) state.resource.manuals = manuals;

  // DELIVERY
  const presetMatch = text.match(/\[x\]\s*\*\*(Minimal|Standard|Full SAP|Custom)\*\*/i);
  if (presetMatch) {
    state.delivery.preset = presetMatch[1];
    applyPreset(presetMatch[1]);
  }

  // Custom delivery checkboxes
  const customBlock = text.match(/### CUSTOM DELIVERY SECTIONS[\s\S]*?(?=###|## )/i);
  if (customBlock) {
    const cb = customBlock[0];
    state.delivery.custom.meetings = /\[x\].*11_MEETINGS/i.test(cb);
    state.delivery.custom.workItems = /\[x\].*12_WORK_ITEMS/i.test(cb);
    state.delivery.custom.migration = /\[x\].*13_MIGRATION/i.test(cb);
    state.delivery.custom.integration = /\[x\].*14_INTEGRATION/i.test(cb);
    state.delivery.custom.testing = /\[x\].*15_TESTING/i.test(cb);
    state.delivery.custom.releaseTransport = /\[x\].*16_RELEASE_TRANSPORT/i.test(cb);
    state.delivery.custom.operations = /\[x\].*17_OPERATIONS/i.test(cb);
  }

  // Templates
  const tplBlock = text.match(/### TEMPLATES[\s\S]*?(?=##[^#]|$)/i);
  if (tplBlock) {
    const tb = tplBlock[0];
    state.delivery.templates.businessRequest = /\[x\].*business-request/i.test(tb);
    state.delivery.templates.changeRequest = /\[x\].*change-request/i.test(tb);
    state.delivery.templates.meetingNote = /\[x\].*meeting-note-template/i.test(tb);
    state.delivery.templates.meetingScreenshots = /\[x\].*meeting-screenshots/i.test(tb);
    state.delivery.templates.testCase = /\[x\].*test-case/i.test(tb);
  }

  saveState();
  // Jump to output step
  state.currentStep = 9;
  render();
  showToast('Template importovan! Zkontroluj data a generuj vystup.');
}

// Drag & drop support on the whole page
document.addEventListener('DOMContentLoaded', () => {
  let dragCounter = 0;
  document.body.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; document.body.classList.add('drag-over'); });
  document.body.addEventListener('dragleave', (e) => { dragCounter--; if (dragCounter <= 0) { dragCounter = 0; document.body.classList.remove('drag-over'); } });
  document.body.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); });
  document.body.addEventListener('drop', (e) => {
    dragCounter = 0; document.body.classList.remove('drag-over');
    e.preventDefault();
    e.stopPropagation();
    const file = e.dataTransfer.files[0];
    if (file && (file.name.endsWith('.md') || file.name.endsWith('.txt'))) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        parseTemplateMarkdown(ev.target.result);
      };
      reader.readAsText(file, 'UTF-8');
    } else {
      showToast('Podporovane formaty: .md, .txt');
    }
  });
});

// Initial render
render();
</script>
</body>
</html>
